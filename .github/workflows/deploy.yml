name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy all clients
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install jq
        run: sudo apt-get install -y jq

      # ── Write client configs from secrets ──────────────────────────────────
      # Each secret holds the full JSON content of deploy/configs/<client>.json.
      # See deploy/configs/template.json for the expected shape.

      - name: Write sponcon config
        run: echo '${{ secrets.CLIENT_CONFIG_SPONCON }}' > deploy/configs/sponcon.json

      - name: Write elysianfields config
        run: echo '${{ secrets.CLIENT_CONFIG_ELYSIANFIELDS }}' > deploy/configs/elysianfields.json

      # ── Deploy: sponcon ────────────────────────────────────────────────────

      - name: Deploy — sponcon
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_SPONCON }}
        run: bash deploy/deploy.sh sponcon

      # ── Deploy: elysianfields ──────────────────────────────────────────────

      - name: Deploy — elysianfields
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_ELYSIANFIELDS }}
        run: bash deploy/deploy.sh elysianfields
