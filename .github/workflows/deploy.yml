name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-production:
    name: Deploy production clients (main)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install jq
        run: sudo apt-get install -y jq

      # ── Write client configs from secrets ──────────────────────────────────
      # Each secret holds the full JSON content of deploy/configs/<client>.json.
      # See deploy/configs/template.json for the expected shape.

      - name: Write sponcon config
        run: echo '${{ secrets.CLIENT_CONFIG_SPONCON }}' > deploy/configs/sponcon.json

      - name: Write elysianfields prod config
        run: echo '${{ secrets.CLIENT_CONFIG_ELYSIANFIELDS_PROD }}' > deploy/configs/elysianfields-prod.json

      - name: Install functions dependencies
        run: npm install --prefix functions

      - name: Enable legacy functions:config commands
        run: firebase experiments:enable legacyRuntimeConfigCommands

      # ── Deploy: sponcon ────────────────────────────────────────────────────

      - name: Deploy — sponcon
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_SPONCON }}
        run: bash deploy/deploy.sh sponcon

      # ── Deploy: elysianfields (prod) ───────────────────────────────────────

      - name: Deploy — elysianfields prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_ELYSIANFIELDS_PROD }}
        run: bash deploy/deploy.sh elysianfields-prod

  deploy-development:
    name: Deploy development clients (develop)
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install jq
        run: sudo apt-get install -y jq

      # ── Write client configs from secrets ──────────────────────────────────

      - name: Write elysianfields dev config
        run: echo '${{ secrets.CLIENT_CONFIG_ELYSIANFIELDS_DEV }}' > deploy/configs/elysianfields-dev.json

      - name: Install functions dependencies
        run: npm install --prefix functions

      - name: Enable legacy functions:config commands
        run: firebase experiments:enable legacyRuntimeConfigCommands

      # ── Deploy: elysianfields (dev) ────────────────────────────────────────

      - name: Deploy — elysianfields dev
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_ELYSIANFIELDS_DEV }}
        run: bash deploy/deploy.sh elysianfields-dev
