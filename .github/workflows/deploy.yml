name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-production:
    name: Deploy production clients (main)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install jq
        run: sudo apt-get install -y jq

      # ── Write client configs from secrets ──────────────────────────────────
      # Each secret holds the full JSON content of deploy/configs/<client>.json.
      # See deploy/configs/template.json for the expected shape.

      - name: Write sponcon config
        run: echo '${{ secrets.CLIENT_CONFIG_SPONCON }}' > deploy/configs/sponcon.json

      - name: Write elysianfields prod config
        run: echo '${{ secrets.CLIENT_CONFIG_ELYSIANFIELDS_PROD }}' > deploy/configs/elysianfields-prod.json

      - name: Install functions dependencies
        run: npm install --prefix functions

      # ── Deploy: sponcon ────────────────────────────────────────────────────

      - name: Authenticate to Google Cloud (sponcon)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_SPONCON }}
          service_account: ${{ secrets.SA_EMAIL_SPONCON }}

      - name: Deploy — sponcon
        run: bash deploy/deploy.sh sponcon

      # ── Deploy: elysianfields (prod) ───────────────────────────────────────

      - name: Authenticate to Google Cloud (elysianfields prod)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_ELYSIANFIELDS_PROD }}
          service_account: ${{ secrets.SA_EMAIL_ELYSIANFIELDS_PROD }}

      - name: Deploy — elysianfields prod
        run: bash deploy/deploy.sh elysianfields-prod

  deploy-development:
    name: Deploy development clients (develop)
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install jq
        run: sudo apt-get install -y jq

      # ── Write client configs from secrets ──────────────────────────────────

      - name: Write elysianfields dev config
        run: echo '${{ secrets.CLIENT_CONFIG_ELYSIANFIELDS_DEV }}' > deploy/configs/elysianfields-dev.json

      - name: Install functions dependencies
        run: npm install --prefix functions

      # ── Deploy: elysianfields (dev) ────────────────────────────────────────

      - name: Authenticate to Google Cloud (elysianfields dev)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_ELYSIANFIELDS_DEV }}
          service_account: ${{ secrets.SA_EMAIL_ELYSIANFIELDS_DEV }}

      - name: Deploy — elysianfields dev
        run: bash deploy/deploy.sh elysianfields-dev
