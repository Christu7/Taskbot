<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskBot — Task Approval</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>TaskBot</h1>
        <p class="subtitle">Task Approval Dashboard</p>
      </div>
      <div id="auth-section">
        <button id="login-btn">Sign in with Google</button>
        <div id="user-info" hidden>
          <span id="user-name"></span>
          <button id="connect-btn">Connect Google Account for Tasks</button>
          <button id="logout-btn">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="pending-tasks" hidden>
      <h2>Pending Approvals</h2>
      <div id="task-list">
        <p class="empty-state">Loading tasks…</p>
      </div>
    </section>
    <section id="login-prompt">
      <p>Sign in to view your pending task approvals.</p>
    </section>
  </main>

  <footer>
    <p>TaskBot &copy; 2024</p>
  </footer>

  <!-- Firebase SDKs (loaded via CDN — swap with your actual config) -->
  <!-- TODO: Replace the config object in app.js with your Firebase project credentials -->
  <script type="module" src="app.js"></script>
</body>
</html>
