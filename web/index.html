<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetBot — Sign in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">MeetBot</div>
      <p class="login-subtitle">Meeting action items, automatically.</p>
      <button id="login-btn" class="btn btn-primary btn-lg">Sign in with Google</button>
      <p id="login-error" class="text-muted mt-4" hidden></p>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithGoogle, handleRedirectResult, waitForAuthReady } from "./js/auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const btn = document.getElementById("login-btn");
    const err = document.getElementById("login-error");

    // Redirect to dashboard whenever auth state resolves to a signed-in user
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "/dashboard";
    });

    // Check for a pending redirect result (returning from Google sign-in page).
    // onAuthStateChanged above handles the redirect to dashboard on success.
    handleRedirectResult().catch((e) => {
      err.textContent = e.message || "Sign-in failed. Try again.";
      err.hidden = false;
    });

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Signing in…";
      err.hidden = true;
      try {
        await signInWithGoogle();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "Sign in with Google";
        err.textContent = e.message || e.code || "Sign-in failed. Try again.";
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
