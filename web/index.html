<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskBot — Sign in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">TaskBot</div>
      <p class="login-subtitle">Meeting action items, automatically.</p>
      <button id="login-btn" class="btn btn-primary btn-lg">Sign in with Google</button>
      <p id="login-error" class="text-muted mt-4" hidden></p>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithGoogle, waitForAuthReady } from "./js/auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // If already signed in, go straight to dashboard
    waitForAuthReady().then((user) => {
      if (user) window.location.href = "/dashboard";
    });

    document.getElementById("login-btn").addEventListener("click", async () => {
      const btn = document.getElementById("login-btn");
      const err = document.getElementById("login-error");
      btn.disabled = true;
      btn.textContent = "Signing in…";
      err.hidden = true;
      try {
        await signInWithGoogle();
        // onAuthStateChanged will fire and redirect
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "Sign in with Google";
        err.textContent = e.message || "Sign-in failed. Try again.";
        err.hidden = false;
      }
    });

    // Redirect after successful sign-in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "/dashboard";
    });
  </script>
</body>
</html>
