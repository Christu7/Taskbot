<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetBot — Sign in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">MeetBot</div>
      <p class="login-subtitle">Meeting action items, automatically.</p>
      <button id="login-btn" class="btn btn-primary btn-lg">Sign in with Google</button>
      <p id="login-error" class="text-muted mt-4" hidden></p>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithGoogle, handleRedirectResult, waitForAuthReady } from "./js/auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const btn = document.getElementById("login-btn");
    const err = document.getElementById("login-error");

    // Redirect already-signed-in users straight to the dashboard.
    // The flag prevents this handler from racing the popup guard below:
    // when a popup is in flight, onAuthStateChanged fires as soon as Firebase
    // creates the Auth user — before the backend domain check has run. We must
    // NOT redirect at that point or the 5-second guard in signInWithGoogle()
    // will be running on a dead page and can never intercept the rejection.
    let _popupActive = false;
    onAuthStateChanged(auth, (user) => {
      if (user && !_popupActive) window.location.href = "/dashboard";
    });

    handleRedirectResult().catch((e) => {
      err.textContent = e.message || "Sign-in failed. Try again.";
      err.hidden = false;
    });

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Signing in…";
      err.hidden = true;
      _popupActive = true;
      try {
        // signInWithGoogle() waits up to 5 s for the backend to reject the
        // account. If the domain isn't provisioned, onUserCreated deletes the
        // Auth user and signInWithGoogle() throws before we ever redirect.
        await signInWithGoogle();
        window.location.href = "/dashboard";
      } catch (e) {
        _popupActive = false;
        btn.disabled = false;
        btn.textContent = "Sign in with Google";
        err.textContent = e.message || e.code || "Sign-in failed. Try again.";
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
